# Cloud Build → Docker → Artifact Registry → Cloud Run
# Trigger can override these via substitution variables (same names as Cloud Console).
substitutions:
  _AR_HOSTNAME: europe-west1-docker.pkg.dev
  _AR_PROJECT_ID: gen-lang-client-0568373820
  _AR_REPOSITORY: cloud-run-source-deploy
  # Must match Artifact Registry package path (GitHub repo name + service from Cloud Run source deploy).
  _IMAGE_NAME: install331/cwainstall-git
  _DEPLOY_REGION: europe-west1
  _SERVICE_NAME: cwainstall-git

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  # Tag image with COMMIT_SHA only (same ref deploy uses). Avoids parallel :latest pushes and tag races.
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - $_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$_IMAGE_NAME:$COMMIT_SHA
      - .

  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - $_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$_IMAGE_NAME:$COMMIT_SHA
    waitFor:
      - build

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - $_SERVICE_NAME
      - --image=$_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$_IMAGE_NAME:$COMMIT_SHA
      - --region=$_DEPLOY_REGION
      - --platform=managed
      - --quiet
    waitFor:
      - push
